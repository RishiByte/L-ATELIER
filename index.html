<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Atelier | Culinary Management</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        charcoal: {
                            DEFAULT: '#1a1a1a',
                            light: '#2a2a2a',
                            dark: '#0f0f0f'
                        },
                        cream: {
                            DEFAULT: '#f5f1e8',
                            dark: '#e6ded1'
                        },
                        gold: {
                            light: '#e8c962',
                            DEFAULT: '#d4af37',
                            dark: '#b08d27'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.8s ease-out forwards',
                        'slide-up': 'slideUp 0.8s ease-out forwards',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background-color: #f5f1e8;
            color: #1a1a1a;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Glassmorphism utilities */
        .glass-nav {
            background: rgba(26, 26, 26, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }

        .glass-card {
            background: white;
            border: 1px solid rgba(212, 175, 55, 0.15);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 25px -5px rgba(212, 175, 55, 0.15), 0 8px 10px -6px rgba(212, 175, 55, 0.1);
            border-color: rgba(212, 175, 55, 0.4);
        }

        /* Gold text gradient */
        .gold-gradient-text {
            background: linear-gradient(135deg, #d4af37, #f3e5ab, #d4af37);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shine 5s linear infinite;
        }

        @keyframes shine {
            to {
                background-position: 200% center;
            }
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f5f1e8;
        }
        ::-webkit-scrollbar-thumb {
            background: #d4af37;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #b08d27;
        }

        /* Input styling overrides */
        input:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.3);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- COMPONENTS ---

        const LoadingScreen = () => (
            <div className="fixed inset-0 bg-charcoal z-50 flex flex-col items-center justify-center">
                <i className="fa-solid fa-utensils text-gold text-4xl animate-bounce mb-6"></i>
                <h2 className="font-serif text-3xl gold-gradient-text tracking-wider">L'Atelier</h2>
                <div className="mt-8 w-48 h-1 bg-charcoal-light rounded-full overflow-hidden">
                    <div className="h-full bg-gold animate-pulse-slow w-full origin-left" style={{ animationDuration: '1.5s' }}></div>
                </div>
            </div>
        );

        const Header = () => (
            <header className="fixed top-0 left-0 right-0 z-40 glass-nav animate-fade-in text-white">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="flex justify-between items-center h-20">
                        {/* Logo */}
                        <div className="flex items-center gap-3 cursor-pointer group">
                            <i className="fa-solid fa-bell-concierge text-gold text-2xl group-hover:rotate-12 transition-transform duration-300"></i>
                            <span className="font-serif text-2xl tracking-widest font-semibold">L'ATELIER</span>
                        </div>

                        {/* Desktop Navigation */}
                        <nav className="hidden md:flex items-center gap-8 font-sans text-sm tracking-wide">
                            <a href="#" className="text-gold border-b-2 border-gold pb-1 transition-colors">Dashboard</a>
                            <a href="#" className="text-gray-300 hover:text-gold transition-colors">AI Generator</a>
                            <a href="#" className="text-gray-300 hover:text-gold transition-colors">Menu</a>
                            <a href="#" className="text-gray-300 hover:text-gold transition-colors">Inventory</a>
                        </nav>

                        {/* Search & Profile */}
                        <div className="flex items-center gap-6">
                            <div className="relative hidden lg:block">
                                <input 
                                    type="text" 
                                    placeholder="Search recipes, ingredients..." 
                                    className="bg-charcoal-light text-sm text-gray-200 rounded-full pl-10 pr-4 py-2 border border-gray-700 focus:border-gold w-64 transition-all duration-300 focus:w-72"
                                />
                                <i className="fa-solid fa-search absolute left-4 top-2.5 text-gray-400"></i>
                            </div>
                            
                            <button className="relative p-2 text-gray-300 hover:text-gold transition-colors">
                                <i className="fa-regular fa-bell text-xl"></i>
                                <span className="absolute top-1 right-1 w-2 h-2 bg-gold rounded-full"></span>
                            </button>

                            <div className="flex items-center gap-3 cursor-pointer pl-4 border-l border-gray-700">
                                <img src="https://api.dicebear.com/7.x/notionists/svg?seed=Chef&backgroundColor=d4af37" alt="Chef Profile" className="w-9 h-9 rounded-full border-2 border-gold object-cover"/>
                                <div className="hidden sm:block">
                                    <p className="text-sm font-medium">Chef Auguste</p>
                                    <p className="text-xs text-gray-400">Executive Chef</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </header>
        );

        const StatCard = ({ icon, label, value, trend, delay }) => (
            <div className={`glass-card rounded-2xl p-6 flex items-start justify-between animate-slide-up`} style={{ animationDelay: delay }}>
                <div>
                    <p className="text-sm text-gray-500 font-medium mb-1 uppercase tracking-wider">{label}</p>
                    <h3 className="font-serif text-3xl font-bold text-charcoal">{value}</h3>
                    <div className="flex items-center gap-2 mt-3">
                        <span className={`text-xs font-semibold px-2 py-1 rounded-full ${trend > 0 ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                            <i className={`fa-solid fa-arrow-${trend > 0 ? 'up' : 'down'} mr-1`}></i>
                            {Math.abs(trend)}%
                        </span>
                        <span className="text-xs text-gray-400">vs last week</span>
                    </div>
                </div>
                <div className="w-12 h-12 rounded-full bg-cream flex items-center justify-center border border-gold/30">
                    <i className={`${icon} text-gold text-xl`}></i>
                </div>
            </div>
        );

        const FeatureCard = ({ title, desc, icon, image, delay }) => (
            <div className="glass-card rounded-2xl overflow-hidden group animate-slide-up cursor-pointer flex flex-col" style={{ animationDelay: delay }}>
                <div className="h-48 overflow-hidden relative">
                    <div className="absolute inset-0 bg-charcoal/40 group-hover:bg-transparent transition-colors duration-500 z-10"></div>
                    <img src={image} alt={title} className="w-full h-full object-cover transform group-hover:scale-110 transition-transform duration-700 ease-out"/>
                    <div className="absolute top-4 left-4 z-20 w-10 h-10 rounded-full bg-white/90 backdrop-blur flex items-center justify-center shadow-lg">
                        <i className={`${icon} text-gold`}></i>
                    </div>
                </div>
                <div className="p-6 flex-1 flex flex-col justify-between bg-white relative">
                    <div>
                        <h4 className="font-serif text-xl font-bold text-charcoal mb-2 group-hover:text-gold transition-colors">{title}</h4>
                        <p className="text-sm text-gray-600 leading-relaxed font-sans">{desc}</p>
                    </div>
                    <div className="mt-6 flex items-center text-sm font-semibold text-gold uppercase tracking-wider">
                        Explore <i className="fa-solid fa-arrow-right ml-2 transform group-hover:translate-x-2 transition-transform"></i>
                    </div>
                </div>
            </div>
        );

        const EmptyState = () => (
            <div className="col-span-full py-16 flex flex-col items-center justify-center border-2 border-dashed border-gray-300 rounded-2xl bg-white/50 backdrop-blur">
                <div className="w-16 h-16 rounded-full bg-cream flex items-center justify-center mb-4">
                    <i className="fa-solid fa-folder-open text-gold text-2xl"></i>
                </div>
                <h4 className="font-serif text-xl mb-2 text-charcoal">No Recent Activity</h4>
                <p className="text-gray-500 text-sm max-w-sm text-center">Your culinary drafts and recent inventory alerts will appear here as you work through the day.</p>
                <button className="mt-6 px-6 py-2 bg-charcoal text-white rounded-full text-sm hover:bg-gold hover:text-charcoal transition-colors duration-300">
                    Create New Entry
                </button>
            </div>
        );

        const Footer = () => (
            <footer className="bg-charcoal text-white pt-16 pb-8 mt-20 border-t border-gold/20">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-12 mb-12">
                        <div className="col-span-1 md:col-span-2">
                            <div className="flex items-center gap-3 mb-6">
                                <i className="fa-solid fa-bell-concierge text-gold text-2xl"></i>
                                <span className="font-serif text-2xl tracking-widest font-semibold">L'ATELIER</span>
                            </div>
                            <p className="text-gray-400 text-sm leading-relaxed max-w-md">
                                Elevating the art of kitchen management. Precision tools for executive chefs, bringing harmony to culinary chaos and transforming raw ingredients into masterpieces.
                            </p>
                        </div>
                        <div>
                            <h5 className="font-serif text-lg text-gold mb-6 relative inline-block">
                                Platform
                                <span className="absolute bottom-0 left-0 w-1/2 h-px bg-gold"></span>
                            </h5>
                            <ul className="space-y-3 text-sm text-gray-400">
                                <li><a href="#" className="hover:text-gold transition-colors">AI Insights</a></li>
                                <li><a href="#" className="hover:text-gold transition-colors">Kitchen Inventory</a></li>
                                <li><a href="#" className="hover:text-gold transition-colors">Menu Engineering</a></li>
                                <li><a href="#" className="hover:text-gold transition-colors">Staff Scheduling</a></li>
                            </ul>
                        </div>
                        <div>
                            <h5 className="font-serif text-lg text-gold mb-6 relative inline-block">
                                Contact
                                <span className="absolute bottom-0 left-0 w-1/2 h-px bg-gold"></span>
                            </h5>
                            <ul className="space-y-3 text-sm text-gray-400">
                                <li className="flex items-center gap-3"><i className="fa-solid fa-envelope w-4"></i> concierge@latelier.com</li>
                                <li className="flex items-center gap-3"><i className="fa-solid fa-phone w-4"></i> +1 (555) 890-1234</li>
                                <li className="flex items-center gap-3"><i className="fa-solid fa-location-dot w-4"></i> 124 Culinary Ave, NY</li>
                            </ul>
                        </div>
                    </div>
                    <div className="border-t border-gray-800 pt-8 flex flex-col md:flex-row justify-between items-center text-xs text-gray-500">
                        <p>&copy; {new Date().getFullYear()} L'Atelier Management Inc. All rights reserved.</p>
                        <div className="flex gap-4 mt-4 md:mt-0">
                            <a href="#" className="hover:text-gold transition-colors">Privacy Policy</a>
                            <a href="#" className="hover:text-gold transition-colors">Terms of Service</a>
                        </div>
                    </div>
                </div>
            </footer>
        );

        const App = () => {
            const [isLoading, setIsLoading] = useState(true);

            useEffect(() => {
                // Simulate initial data loading and professional boot sequence
                const timer = setTimeout(() => {
                    setIsLoading(false);
                }, 2000);
                return () => clearTimeout(timer);
            }, []);

            if (isLoading) return <LoadingScreen />;

            return (
                <div className="min-h-screen font-sans bg-[#fbf9f6]">
                    <Header />
                    
                    <main className="pt-32 pb-10">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            
                            {/* Hero Section */}
                            <div className="mb-12 animate-fade-in">
                                <h1 className="font-serif text-4xl md:text-5xl font-bold text-charcoal mb-4">
                                    Good Evening, <span className="gold-gradient-text italic">Chef Auguste.</span>
                                </h1>
                                <p className="text-gray-600 max-w-2xl text-lg font-light">
                                    The dinner service approaches. Your kitchen is primed, inventory is stable, and 3 new AI-optimized seasonal recipes await your review.
                                </p>
                            </div>

                            {/* Quick Stats Dashboard */}
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
                                <StatCard icon="fa-solid fa-boxes-stacked" label="Active Inventory" value="1,284" trend={4.2} delay="0.1s" />
                                <StatCard icon="fa-solid fa-book-open" label="Saved Recipes" value="432" trend={1.8} delay="0.2s" />
                                <StatCard icon="fa-solid fa-star" label="Feedback Score" value="4.9" trend={0.5} delay="0.3s" />
                                <StatCard icon="fa-solid fa-chart-line" label="Resource Efficiency" value="94%" trend={-2.1} delay="0.4s" />
                            </div>

                            {/* Section Header */}
                            <div className="flex justify-between items-end mb-8 animate-fade-in" style={{ animationDelay: '0.5s' }}>
                                <div>
                                    <h2 className="font-serif text-2xl text-charcoal font-semibold border-l-4 border-gold pl-4">Core Stations</h2>
                                </div>
                                <button className="text-sm font-semibold text-gold hover:text-charcoal transition-colors">View All Activities</button>
                            </div>

                            {/* Dashboard Grid */}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-16">
                                <FeatureCard 
                                    title="AI Recipe Generator"
                                    desc="Generate avant-garde culinary concepts based on current inventory surplus and seasonal local produce available in your region."
                                    icon="fa-solid fa-wand-magic-sparkles"
                                    image="https://images.unsplash.com/photo-1577106263724-2c8e03bfe9cf?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80"
                                    delay="0.6s"
                                />
                                <FeatureCard 
                                    title="Digital Menu Engineering"
                                    desc="Analyze dish profitability and popularity. Reconstruct your seasonal menu for maximum aesthetic appeal and financial margin."
                                    icon="fa-solid fa-layer-group"
                                    image="https://images.unsplash.com/photo-1544025162-d76694265947?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80"
                                    delay="0.7s"
                                />
                                <FeatureCard 
                                    title="Kitchen Inventory"
                                    desc="Real-time tracking of premium ingredients, automated restock alerts for rare spices, and waste management analytics."
                                    icon="fa-solid fa-box-open"
                                    image="https://images.unsplash.com/photo-1589010588553-46e8e7c21788?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80"
                                    delay="0.8s"
                                />
                                <FeatureCard 
                                    title="Recipe Optimizer"
                                    desc="Fine-tune proportions, document precise plating instructions, and calculate exact per-plate food costs dynamically."
                                    icon="fa-solid fa-scale-balanced"
                                    image="https://images.unsplash.com/photo-1600565193348-f74bd3c7ccdf?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80"
                                    delay="0.9s"
                                />
                            </div>

                            {/* Recent Activity / Empty State Example */}
                            <div className="mb-12 animate-fade-in" style={{ animationDelay: '1s' }}>
                                <h2 className="font-serif text-2xl text-charcoal font-semibold border-l-4 border-gold pl-4 mb-6">Service Prep Board</h2>
                                <div className="grid grid-cols-1 gap-4">
                                    <EmptyState />
                                </div>
                            </div>
                            
                        </div>
                    </main>

                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
